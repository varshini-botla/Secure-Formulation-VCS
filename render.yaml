services:
  # NestJS Backend API Service
  - type: web
    name: secure-formulation-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npx prisma db seed && npm run start:prod
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: secure-formulation-db
          property: connectionString

databases:
  # PostgreSQL Database Service
  - name: secure-formulation-db
    plan: free
    postgresMajorVersion: 15
